<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<style>
body{font-family:'Segoe UI','Malgun Gothic',sans-serif;width:280px;padding:14px;margin:0}
h3{margin:0 0 4px;font-size:15px}
.sub{color:#6b7280;font-size:11px;margin-bottom:12px}
.row{display:flex;gap:6px;align-items:center;margin-bottom:10px}
select{border:1px solid #e5e7eb;border-radius:6px;padding:4px 8px;font-size:12px}
button{border:0;border-radius:6px;padding:8px 12px;font-size:13px;cursor:pointer;flex:1}
#btnStart{background:#2563eb;color:#fff}
#btnStop{background:#fee2e2;color:#dc2626}
button:disabled{opacity:.45;cursor:default}
#status{font-size:12px;color:#374151;background:#f3f4f6;border-radius:6px;padding:8px;min-height:34px;line-height:1.5}
#status.on{color:#2563eb;font-weight:600}
a{color:#2563eb;font-size:11px}
</style></head><body>
<h3>🤖 AI개요 체크 <span style="color:#2563eb;font-size:11px" id="ver"></span></h3>
<div class="sub">이 크롬(로그인 세션)에서 검색해 측정 — <a href="http://127.0.0.1:5630" target="_blank">앱 열기</a></div>
<div class="row">
 <label style="font-size:12px">반복</label>
 <select id="repeats"><option>1</option><option selected>2</option><option>3</option></select>
 <label style="font-size:12px"><input type="checkbox" id="incog" checked> 시크릿 탭</label>
</div>
<div class="row">
 <button id="btnStart">▶ 전체 측정</button>
 <button id="btnStop">■</button>
</div>
<div id="status">대기 중</div>
<script src="popup.js"></script>
</body></html>
